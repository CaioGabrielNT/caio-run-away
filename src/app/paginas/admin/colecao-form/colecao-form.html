<form [formGroup]="colecaoForm" (ngSubmit)="onSubmit()" class="colecao-form">
   

  <div class="artigo-card">
    <div class="artigo-card__header">
      <h1>{{id ? 'Editar coleção' : 'Criar coleção'}}</h1>
      <p class="artigo-card__subtitle">Preencha os dados para criar uma nova coleção</p>
    </div>

    <div class="campo-grupo">
      <label for="titulo" class="campo-label">Nome</label>
      <input
        type="text"
        id="nome"
        name="nome"
        class="campo-input"
        placeholder="Digite o nome da coleção"
        required
        formControlName="nome"
      />
    </div>

    <div class="campo-grupo">
      <label for="descricao" class="campo-label">Descrição</label>
      <textarea
        id="descricao"
        name="descricao"
        class="campo-input"
        placeholder="Digite a descrição"
        rows="5"
        required
        formControlName="descricao"
      ></textarea>
    </div>

    <div class="linha-campos">
      <div class="campo-grupo">
        <label for="categoria" class="campo-label">Categoria</label>
        <input
          type="text"
          id="categoria"
          name="categoria"
          class="campo-input"
          placeholder="Digite a categoria"
          required
          formControlName="categoria"
        />
      </div>

      <div class="preço-grupo">
        <label for="preço" class="preço-label">Preço</label>
        <input
          type="number"
          id="preço"
          name="preço"
          class="preço-input"          
          placeholder="Digite o preço"
          required
          formControlName="preco"
        />
      </div>
    </div>

    <div class="linha-campos">
      <div class="campo-grupo">
        <label for="imagem" class="campo-label">Imagem</label>
        <input
          type="file"
          id="imagem"
          name="imagem"
          class="campo-input"
          accept=".jpg,.png"
          required
          (change)="onFileSelected( $event)"
        />
      </div>

      <div class="campo-grupo">
        <label for="data_publicacao" class="campo-label">Tag</label>
        <input
          type="date"
          id="tag"
          name="tag"
          class="campo-input"
          required
          formControlName="tag"
        />
      </div>
    </div>

    <div class="artigo-card__footer">
      <button type="submit" class="btn-primario">Salvar</button>
    </div>
  </div>
</form>
