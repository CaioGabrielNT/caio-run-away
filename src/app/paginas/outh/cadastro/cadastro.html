
    <main class="main-container"> 
        <div class="frase-runway-fundo">RUNWAY</div>
        <div class="card-register">
            
            <div class="form-section">
                <h2>Criar Conta</h2>
                
                <form>
                    <div class="input-group">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" placeholder="Seu nome completo" required>
                    </div>

                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="seu-email@gmail.com" required>
                    </div>

                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="Crie uma senha forte" required>
                    </div>

                    <div class="input-group">
                        <label for="confirma-senha">Confirmar Senha</label>
                        <input type="password" id="confirma-senha" placeholder="Digite a senha novamente" required>
                    </div>

                    <button type="submit" class="btn-submit">Criar Conta</button>
                </form>

                <p class="switch-page">Já possui uma conta? <a routerLink="/login">Faça login</a></p>
                
                <footer class="form-footer">
                    <a href="#">Termos & Condições</a>
                </footer>
            </div>

            <div class="image-section">
                <img src="passarela2.jpeg" alt="Runway Fashion Show">
            </div>

        </div>
    </main>
