
    <main class="main-container"> 
        <div class="frase-runway-fundo">RUNWAY</div>
        <div class="card-register">
            
            <div class="form-section">
                <h2>Criar Conta</h2>
                
                <form [formGroup]="cadastroForm" (ngSubmit)="onSubmit()">
                    <div class="input-group" >
                        <label for="nome">Nome Completo</label>
                        <input type="text" formControlName="name" id="nome" placeholder="Seu nome completo" required>
                    </div>

                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" formControlName="email" id="email" placeholder="seu-email@gmail.com" required>
                    </div>

                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <input type="password" formControlName="password" id="senha" placeholder="Crie uma senha forte" required>
                    </div>


                    <button type="submit" class="btn-submit">
                        @if (estaCarregando()){
                            Cadastrando...
                        } @else {
                        Criar Conta
                        }</button>
                </form>

                <p class="switch-page">Já possui uma conta? <a routerLink="/login">Faça login</a></p>
                
                <footer class="form-footer">
                    <a href="#">Termos & Condições</a>
                </footer>
            </div>

            <div class="image-section">
                <img src="passarela2.jpeg" alt="Runway Fashion Show">
            </div>

        </div>
    </main>
