<main class="main-container">
    <div class="frase-runway-fundo">RUNWAY</div>
    <div class="card-register">
        <div class="form-section">
            <h2>Criar Conta</h2>

            <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input class="campo-input" type="email" id="email" name="email" placeholder="seu@email.com"
                        required="" formControlName="email" />
                </div>

                <div class="input-group password-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" value="••••••••••••" formControlName="password" />
                    <i class="fa-regular fa-eye-slash toggle-password"></i>
                </div>

                <button type="submit" class="btn-submit">Entrar</button>
            </form>

            <p class="switch-page">Não possui uma conta? <a routerLink="/cadastro">Cadastre-se</a></p>

            <footer class="form-footer">
                <a href="#">Termos & Condições</a>
            </footer>
        </div>

        <div class="image-section">
            <img src="passarela1.jpeg" alt="Runway Fashion Show" />
        </div>
    </div>
</main>
