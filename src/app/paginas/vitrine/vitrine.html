<main>
  <!-- BANNER HERO DA SEÇÃO -->

  <section class="moda-banner">
    <span class="moda-banner-tag"><i class="fas fa-sparkles"></i> Coleção Runway 2026</span>
    <h1 class="moda-banner-titulo">A alta costura<br />ao seu alcance</h1>
    <p class="moda-banner-sub">
      Explore peças exclusivas, perfumes importados e joias artesanais projetadas para expressar a
      sua verdadeira essência.
    </p>
    <div class="banner-numero-fundo">RW</div>
  </section>

  <!-- BARRA DE CONTROLES E FILTROS RÁPIDOS -->
  <div class="moda-controles" id="catalogo">
    <div class="busca-container">
      <span class="busca-icone"><i class="fas fa-search"></i></span>
      <input class="busca-input" type="text" placeholder="Buscar produtos..." />
    </div>

    <div class="filtros-lista">
      <button class="filtro-btn ativo">Todos</button>
      <button class="filtro-btn">Roupas</button>
      <button class="filtro-btn">Perfumes</button>
      <button class="filtro-btn">Bolsas</button>
      <button class="filtro-btn">Joias</button>
    </div>
  </div>

  <!-- GRADE DE PRODUTOS (VITRINE) -->
  <section class="vitrine-container">
    <p class="vitrine-titulo">4 produtos em destaque</p>

    <div class="vitrine">
        @for (item of moda(); track $index){
          <app-moda [data]="item"></app-moda>
        }

    </div>
  </section>
