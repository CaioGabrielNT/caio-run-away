  <article class="card-produto animar-subir delay-1">
          <div class="imagem-wrapper">
            <span class="tag-destaque">Novidade</span>
            <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?q=80&w=600" alt="Vestido Midi de Seda">
          </div>
          <div class="info-produto">
            <span class="badge badge-laranja"><i class="fas fa-tshirt"></i> 
              {{data().categoria}}
            </span>
            
            <h2 class="nome-produto">
              {{data().nome}}
            </h2>
            <p class="descricao-produto">
            </p>
            <div class="produto-rodape">
              <span class="preco">
                {{data().preco}}
              </span>
              <button class="btn-primario">Ver mais <i class="fas fa-arrow-right"></i></button>
            </div>
          </div>
        </article>
